<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlipperRooms — PvP Coinflip on Base</title>
    <meta name="description" content="PvP coinflip rooms with revenue seats. Play, earn, own. Built on Base." />
    <meta name="theme-color" content="#0a0a1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="FlipperRooms — PvP Coinflip on Base" />
    <meta property="og:description" content="Create rooms, flip coins, win ETH. 256 revenue seats earn yield from every flip." />
    <meta property="og:image" content="https://flipper-rooms-frontend.vercel.app/og-image.png" />
    <meta property="og:url" content="https://flipper-rooms-frontend.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlipperRooms — PvP Coinflip on Base" />
    <meta name="twitter:description" content="PvP coinflip rooms with revenue seats on Base chain" />
    <meta name="twitter:image" content="https://flipper-rooms-frontend.vercel.app/og-image.png" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://sepolia.base.org" />
    <link rel="preconnect" href="https://auth.privy.io" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" as="style" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0a0a1a; -webkit-font-smoothing: antialiased; }
      html, body, #root { min-height: 100vh; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; background: #0a0a1a; font-family: sans-serif;
      ">
        <div style="
          font-size: 24px; font-weight: 900; color: #f7b32b;
          letter-spacing: 6px; margin-bottom: 16px;
        ">FLIPPERROOMS</div>
        <div style="
          width: 40px; height: 40px; border: 3px solid #1c2430;
          border-top-color: #f7b32b; border-radius: 50%;
          animation: spin 0.8s linear infinite;
        "></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
